<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Splash</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f172a, #1e3a8a, #0f172a);
      --text: #f8fafc;
      --accent: #38bdf8;
      --card: rgba(15, 23, 42, 0.82);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      text-align: center;
    }
    .hero {
      width: min(900px, 90vw);
      backdrop-filter: blur(10px);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.3);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .hero h1 {
      margin: 0 0 0.6rem;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: 0.04em;
    }
    .hero p {
      margin: 0 0 1.6rem;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.45);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.55);
    }
    .glow {
      position: absolute;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.6;
      pointer-events: none;
      animation: drift 12s infinite alternate ease-in-out;
    }
    .glow:nth-child(1) {
      width: 320px;
      height: 320px;
      background: #34d399;
      top: -90px;
      left: -90px;
    }
    .glow:nth-child(2) {
      width: 260px;
      height: 260px;
      background: #f472b6;
      bottom: -80px;
      right: -80px;
      animation-duration: 10s;
    }
    @keyframes drift {
      to { transform: translate(24px, -24px) scale(1.05); }
    }
    .stats { display: flex; justify-content: center; gap: 1rem; margin-top: 1.6rem; flex-wrap: wrap; }
    .stat {
      flex: 1 1 132px;
      min-width: 132px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      padding: 0.85rem 1rem;
    }
    .stat strong { display: block; font-size: 1.25rem; }
    .stat span { font-size: 0.85rem; color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="glow"></div>
    <div class="glow"></div>
    <h1>Random Webspace</h1>
    <p>Welcome to a spontaneously generated one-page site. Content, colors and events are crafted by a random idea engine in your browser.</p>
    <a class="btn" href="#explore">Explore</a>
    <div class="stats">
      <div class="stat"><strong id="seed">42</strong><span>Seed value</span></div>
      <div class="stat"><strong id="fact">Curious</strong><span>Random fact</span></div>
      <div class="stat"><strong id="time">--:--:--</strong><span>Local time</span></div>
    </div>
  </div>

  <script>
    const facts = [
      "You can make 37 flavors with 6 ingredients",
      "The 1st computer virus was in 1983",
      "Octopus has three hearts",
      "Vanilla is from orchids",
      "Bananas are berries, strawberries not",
      "A day on Venus is longer than a year"
    ];

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function pad(n) { return n.toString().padStart(2, "0"); }
    function now() {
      const d = new Date();
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function updateStats() {
      document.getElementById("seed").textContent = Math.floor(Math.random() * 1000);
      document.getElementById("fact").textContent = pickRandom(facts);
      document.getElementById("time").textContent = now();
    }

    updateStats();
    setInterval(updateStats, 3500);
  </script>
</body>
</html>
